name: dawurogna_figurative_speaking
description: "A new Flutter project."

publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.2+3

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  google_nav_bar: ^5.0.7
  go_router: ^17.0.1
  provider: ^6.1.5
  font_awesome_flutter: ^11.0.0
  share_plus: ^12.0.1
  url_launcher: ^6.3.2
  upgrader: ^12.4.0
  shared_preferences: ^2.5.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#ffffff"
  min_sdk_android: 16

flutter:
  uses-material-design: true

  assets:
    - assets/images/book_icon.png
    - assets/images/dawuro_gihibli.png
    - assets/data/dawurogna_proverbs.json

  fonts:
    - family: Dash
      fonts:
        - asset: assets/fonts/Dash-Horizon-Demo.otf

    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-VariableFont_wdth.ttf

    - family: OpenSans
      fonts:
        - asset: assets/fonts/OpenSans-VariableFont_wdth.ttf
